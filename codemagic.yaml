workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60

    environment:
      java: 17

    scripts:
      - name: Prepare Gradle
        script: |
          chmod +x gradlew

      - name: Generate wrapper if missing
        script: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Wrapper missing - generating..."
            gradle wrapper
          fi

      - name: Build APK
        script: |
          ./gradlew assembleDebug

    artifacts:
      - app/build/outputs/**/*.apk
